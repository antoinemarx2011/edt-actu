name: 🎓 Surveillance EDT EcoleDirecte

on:
  schedule:
    - cron: '*/10 6-20 * * 1-5'
  workflow_dispatch:

jobs:
  check-edt:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install ecoledirecte-py-client requests

      # Restaure les fichiers de cache (EDT + MFA)
      - name: 💾 Restore cache files
        uses: actions/cache@v4
        with:
          path: |
            edt_cache.json
            qcm.json
            device.json
          key: edt-cache-${{ github.run_id }}
          restore-keys: |
            edt-cache-

      - name: 🔍 Check EDT
        env:
          ED_USERNAME:  ${{ secrets.ED_USERNAME }}
          ED_PASSWORD:  ${{ secrets.ED_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python edt_checker.py

      - name: 💾 Save cache files
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            edt_cache.json
            qcm.json
            device.json
          key: edt-cache-${{ github.run_id }}
