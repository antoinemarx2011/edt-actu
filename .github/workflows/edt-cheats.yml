name: 🎓 Surveillance EDT EcoleDirecte

on:
  schedule:
    - cron: '*/10 6-20 * * 1-5'
  workflow_dispatch:

jobs:
  check-edt:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 💾 Restore cache files
        uses: actions/cache@v5
        with:
          path: |
            edt_cache.json
            qcm.json
          key: edt-cache-${{ github.run_id }}
          restore-keys: |
            edt-cache-

      - name: 🔎 Afficher le cache EDT
        run: |
          if [ -f edt_cache.json ]; then
            cat edt_cache.json
          else
            echo "Pas de cache trouvé"
          fi

      - name: 🔍 Check EDT
        env:
          ED_USERNAME:  ${{ secrets.ED_USERNAME }}
          ED_PASSWORD:  ${{ secrets.ED_PASSWORD }}
          ED_CN:        ${{ secrets.ED_CN }}
          ED_CV:        ${{ secrets.ED_CV }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python edt_checker.py

      - name: 💾 Save cache files
        uses: actions/cache/save@v5
        if: always()
        with:
          path: |
            edt_cache.json
            qcm.json
          key: edt-cache-${{ github.run_id }}
