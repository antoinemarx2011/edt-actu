name: 🎓 Surveillance EDT EcoleDirecte
on:
  schedule:
    - cron: '*/10 6-20 * * 1-5'
  workflow_dispatch:
jobs:
  check-edt:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 📦 Install
        run: pip install requests
      - name: 💾 Restore cache EDT
        uses: actions/cache@v4
        with:
          path: edt_cache.json
          key: edt-${{ github.run_id }}
          restore-keys: edt-
      - name: 🔍 Check EDT
        env:
          ED_USERNAME:  ${{ secrets.ED_USERNAME }}
          ED_PASSWORD:  ${{ secrets.ED_PASSWORD }}
          ED_CN:        ${{ secrets.ED_CN }}
          ED_CV:        ${{ secrets.ED_CV }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python edt_checker.py
      - name: 💾 Save cache EDT
        uses: actions/cache/save@v4
        if: always()
        with:
          path: edt_cache.json
          key: edt-${{ github.run_id }}
