# .github/workflows/edt_check.yml
# Place ce fichier dans ton repo GitHub à ce chemin exact

name: 🎓 Surveillance EDT EcoleDirecte

on:
  schedule:
    # Toutes les 10 minutes, du lundi au vendredi, de 6h à 20h UTC (8h-22h Paris)
    - cron: '*/10 6-20 * * 1-5'
  workflow_dispatch:  # Permet de lancer manuellement depuis GitHub

jobs:
  check-edt:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du repo
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # 2. Installe Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installe les dépendances
      - name: 📦 Install dependencies
        run: pip install requests

      # 4. Restaure le cache EDT (pour comparer les changements)
      - name: 💾 Restore EDT cache
        uses: actions/cache@v4
        with:
          path: edt_cache.json
          key: edt-cache-${{ github.run_id }}
          restore-keys: |
            edt-cache-

      # 5. Lance le script
      - name: 🔍 Check EDT
        env:
          ED_USERNAME:  ${{ secrets.ED_USERNAME }}
          ED_PASSWORD:  ${{ secrets.ED_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python edt_checker.py

      # 6. Sauvegarde le cache mis à jour
      - name: 💾 Save EDT cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: edt_cache.json
          key: edt-cache-${{ github.run_id }}

